<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>透明窗口</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100vw;
      height: 100vh;
      background-color: transparent;
      overflow: hidden;
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
    }
    
    .gif-container {
      position: relative;
    }
    
    .gif-container img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gif-container">
      <img id="gifImage" src="" alt="动画">
    </div>
  </div>
  
  <script>
    // 动态加载 GIF 图片
    const gifImage = document.getElementById('gifImage');
    
    // 获取当前 HTML 文件的路径
    const currentPath = window.location.pathname;
    const currentDir = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
    
    // 设置 GIF 图片路径
    gifImage.src = currentDir + '祥子鼓掌.gif';
    
    // 如果图片加载失败，显示错误信息
    gifImage.onerror = function() {
      console.error('GIF 图片加载失败');
      console.log('尝试的路径:', gifImage.src);
    };
    
    gifImage.onload = function() {
      console.log('GIF 图片加载成功');
    };
  </script>
</body>
</html>
